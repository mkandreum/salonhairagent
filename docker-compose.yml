version: '3.8'
services:
  triage-mvp:
    build: .
    volumes:
      - ./samples:/app/samples
      - ./storage:/app/storage
    container_name: triage-mvp
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    # Default: run API
    # To run CLI instead: command: ["python3", "/app/automation/ticket_triage_mvp.py", "/app/samples/sample_tickets.json"]
