version: '3.8'

services:
  backend:
    build: .
    volumes:
      - ./samples:/app/samples
      - ./storage:/app/storage
    container_name: salon-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  frontend:
    build: 
      context: ./salon-dashboard-frontend
      dockerfile: Dockerfile
    container_name: salon-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
