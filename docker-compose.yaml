version: '3.8'

# =============================================================
# COOLIFY DEPLOYMENT — single container, all-in-one
# PostgreSQL + Node backend + Next.js frontend
#
# NO pongas ports aquí — Coolify usa Traefik como proxy y
# gestiona el routing automáticamente. Solo define el puerto
# interno en la configuración de Coolify (Port: 80).
# =============================================================

services:
  salonhair:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    volumes:
      - type: bind
        source: ./pgdata
        target: /var/lib/postgresql/data
        is_directory: true
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PASSWORD=${DB_PASSWORD:-salonapp_change_me}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
