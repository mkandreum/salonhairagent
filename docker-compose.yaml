version: '3.8'

# Single-container setup: PostgreSQL + backend + frontend all in one image.
# In Coolify, just deploy this as a single service pointing to the Dockerfile.
# Only TWO environment variables are required (see below).

services:
  salonhair:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    volumes:
      # Persist PostgreSQL data between restarts/redeploys
      - pgdata:/var/lib/postgresql/data
    environment:
      # ❗ REQUIRED - Change these two before deploying:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
