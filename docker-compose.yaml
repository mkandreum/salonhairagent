version: '3.8'

# =============================================================
# COOLIFY DEPLOYMENT — single container, all-in-one
# PostgreSQL + Node backend + Next.js frontend
#
# IMPORTANTE en Coolify:
#   1. Activa "Preserve Repository During Deployment" (General > Settings)
#      Esto evita que Coolify recree volúmenes en cada deploy.
#   2. Añade las 2 variables de entorno (JWT_SECRET y DB_PASSWORD)
#   3. El puerto expuesto es el 80
# =============================================================

services:
  salonhair:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    volumes:
      # Bind mount con path absoluto — compatible con Coolify
      # Coolify almacena los datos en /data/coolify/applications/<app-id>/
      # El directorio 'pgdata' se crea automáticamente si no existe
      - type: bind
        source: ./pgdata
        target: /var/lib/postgresql/data
        is_directory: true
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PASSWORD=${DB_PASSWORD:-salonapp_change_me}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
