version: '3.8'

services:
  backend:
    build: .
    volumes:
      - ./samples:/app/samples
      - ./storage:/app/storage
    expose:
      - "5000"
    environment:
      - PORT=5000

  frontend:
    build: 
      context: ./salon-dashboard-frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
