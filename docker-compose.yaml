version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    restart: always
    volumes:
      - ./data:/app/data


    expose:
      - "3000"
    environment:
      - PORT=3000
    networks:
      - salon-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  frontend:
    build:
      context: ./salon-dashboard-frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - salon-network
    labels:
      - "coolify.managed=true"

networks:
  salon-network:
    driver: bridge
